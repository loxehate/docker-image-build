<script>
// 1. 加载剧本源码预览
async function loadSource(filename) {
    const response = await fetch(`/api/source/${filename}`);
    const data = await response.json();
    if (data.success) {
        // 更新右侧代码块内容
        const codeContainer = document.querySelector('.font-mono.text-\\[13px\\]');
        // 简单处理：将内容放入 PRE 标签保持格式
        codeContainer.innerHTML = `<pre class="text-slate-300 p-2">${data.content}</pre>`;
        // 更新标题
        document.querySelector('.text-slate-300.font-bold').innerText = `源代码 (Source Code): ${filename}`;
    }
}

// 2. 执行剧本
async function runPlaybook(filename) {
    // 阻止点击行触发加载源码（可选）
    event.stopPropagation();
    
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "执行中...";
    btn.disabled = true;

    try {
        const response = await fetch('/api/run', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ playbook: filename })
        });
        const data = await response.json();
        if (data.success) {
            alert(`启动成功! 作业ID: ${data.job_id}`);
        } else {
            alert(`错误: ${data.error}`);
        }
    } catch (e) {
        alert("请求失败，请检查后端状态");
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

// 3. 为表格行绑定点击事件
document.querySelectorAll('tbody tr').forEach(row => {
    const filename = row.querySelector('.text-sm.font-semibold').innerText.trim();
    row.onclick = () => loadSource(filename);
    
    // 为按钮绑定执行事件
    const runBtn = row.querySelector('button');
    runBtn.onclick = (e) => {
        e.stopPropagation();
        runPlaybook(filename);
    };
});
</script>

<tbody class="divide-y divide-slate-100 dark:divide-slate-800">
    {% for pb in playbooks %}
    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors group cursor-pointer" 
        onclick="loadSource('{{ pb.name }}')">
        <td class="px-6 py-4">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-slate-400 group-hover:text-primary">description</span>
                <span class="text-sm font-semibold">{{ pb.name }}</span>
            </div>
        </td>
        <td class="px-6 py-4 text-right">
            <button onclick="runPlaybook('{{ pb.name }}')" class="bg-primary text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-lg hover:scale-105 transition-all">
                立即运行 (Run)
            </button>
        </td>
    </tr>
    {% endfor %}
</tbody>

<div id="code-display" class="flex-1 overflow-auto p-4 font-mono text-[13px] leading-relaxed">
    <pre id="yaml-content" class="text-slate-300"># 点击剧本查看源码...</pre>
</div>

<script>
async function loadSource(filename) {
    const res = await fetch(`/api/source/${filename}`);
    const data = await res.json();
    if(data.success) {
        document.getElementById('yaml-content').textContent = data.content;
    }
}

async function runPlaybook(filename) {
    const res = await fetch('/api/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({playbook: filename})
    });
    const data = await res.json();
    if(data.success) alert('作业已启动: ' + data.job_id);
}
</script>
